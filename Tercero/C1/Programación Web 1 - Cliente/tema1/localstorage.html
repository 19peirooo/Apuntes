<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage Attempt</title>

    <script>
        const btn = document.querySelector('#input_btn');
        btn.addEventListener('click', showandStoreInfo);
        function showandStoreInfo() {
            const typed = document.querySelector('#typedText');
            const input_text = document.querySelector('#inp_first_name');
            typed.innerHTML = input_text.value;
            localStorage.setItem("First_Name", input_text.value)
            return true
        }
    </script>
</head>
<body>
    <form>
        <input type="text" id="inp_first_name" placeholder="Escribe tu nombre...">
        <button id="input_btn" onclick="showandStoreInfo()">Guardar Datos</button>
        <p id="typedText"></p>
    </form>
    
</body>
</html>
