<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On load Example</title>
    <script>
        window.addEventListener('load', (event) => {
            let element = document.querySelector('#mytext');
            element.innerHTML = element.innerHTML+"<br> The page is now loaded"
        });
    </script>
</head>
<body>
    <p>This is a simple pager</p>
</body>
</html>
