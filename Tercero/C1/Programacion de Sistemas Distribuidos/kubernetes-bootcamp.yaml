apiVersion: apps/v1
kind: Deployment
metadata:
 name: kubernetes-bootcamp
 namespace: default
spec:
 replicas: 3
 selector:
  matchLabels:
   app: bootcamp
  template:
   metadata:
    labels:
     app: bootcamp
   spec:
    containers:
    - name: kubernetes-bootcamp
      image: docker.io/jocatalin/kubernetes-bootcamp:v2